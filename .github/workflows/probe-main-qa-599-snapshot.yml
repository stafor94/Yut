name: Probe merged Main Branch QA 599 snapshot

on:
  push:
    branches:
      - probe/main-qa-599-snapshot

permissions:
  actions: read
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    env:
      TARGET_SHA: 8bc0d277b04e42e287cb0a30f6a26371feebd745
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Collect current status
        shell: bash
        run: |
          set -euo pipefail
          RUNS="$(gh api --method GET "repos/${GITHUB_REPOSITORY}/actions/runs" -f head_sha="$TARGET_SHA" -f event=push -f per_page=20)"
          RUN_ID="$(jq -r '.workflow_runs[] | select(.name == "Main Branch QA") | .id' <<<"$RUNS" | head -n1)"
          if [ -z "$RUN_ID" ] || [ "$RUN_ID" = null ]; then
            jq -n --arg sha "$TARGET_SHA" '{error:"Main Branch QA run not found",head_sha:$sha}' > MAIN_QA_599_SNAPSHOT.json
          else
            RUN="$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${RUN_ID}")"
            JOBS="$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${RUN_ID}/jobs?per_page=100")"
            jq -n --argjson run "$RUN" --argjson jobs "$JOBS" '{run:{id:$run.id,run_number:$run.run_number,name:$run.name,event:$run.event,status:$run.status,conclusion:$run.conclusion,head_sha:$run.head_sha,html_url:$run.html_url,created_at:$run.created_at,updated_at:$run.updated_at},jobs:[$jobs.jobs[]|{id,name,status,conclusion,started_at,completed_at,html_url,steps:[.steps[]?|{name,status,conclusion,number}]}]}' > MAIN_QA_599_SNAPSHOT.json
          fi
      - name: Commit snapshot
        shell: bash
        run: |
          rm -f .github/workflows/probe-main-qa-599-snapshot.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add MAIN_QA_599_SNAPSHOT.json .github/workflows/probe-main-qa-599-snapshot.yml
          git commit -m "병합 SHA QA 즉시 상태 기록"
          git push
