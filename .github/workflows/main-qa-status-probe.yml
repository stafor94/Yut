name: Main QA status probe

on:
  push:
    branches:
      - agent/main-qa-status-probe

permissions:
  actions: read
  contents: write

jobs:
  probe:
    if: github.event.head_commit.message == 'trigger main QA status probe'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/main-qa-status-probe
      - name: Download latest failed job log
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_JOB_ID: 86662035051
        run: |
          curl --fail --silent --show-error --location \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/actions/jobs/$TARGET_JOB_ID/logs" \
            > .github/main-qa-job.log
      - name: Extract focused failed test details
        run: |
          python3 <<'PY'
          from pathlib import Path

          source = Path('.github/main-qa-job.log').read_text(errors='replace').splitlines()
          needles = ('✘', 'Error:', 'tablet-ipad', 'QA emulator suite failed', 'TimeoutError', 'toBeVisible', 'RESOURCE_EXHAUSTED', 'INTERNAL:', 'Expected:', 'Received:')
          indexes = [index for index, line in enumerate(source) if any(needle.lower() in line.lower() for needle in needles)]
          selected = set()
          for index in indexes:
              selected.update(range(max(0, index - 14), min(len(source), index + 42)))
          output = []
          previous = -2
          for index in sorted(selected):
              if index > previous + 1:
                  output.append('---')
              output.append(f'{index + 1}: {source[index]}')
              previous = index
          Path('.github/main-qa-job-focused.log').write_text('\n'.join(output) + '\n')
          PY
      - name: Commit focused snapshot
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/main-qa-job.log .github/main-qa-job-focused.log
          git commit -m 'record main QA status'
          git push origin HEAD:agent/main-qa-status-probe
