name: Main QA status probe

on:
  push:
    branches:
      - agent/main-qa-status-probe

permissions:
  actions: read
  contents: write

jobs:
  probe:
    if: github.event.head_commit.message == 'trigger main QA status probe'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/main-qa-status-probe
      - name: Download and summarize failed job log
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_JOB_ID: 86661149968
        run: |
          curl --fail --silent --show-error --location \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/actions/jobs/$TARGET_JOB_ID/logs" \
            > .github/main-qa-job.log
          grep -E -i -B 8 -A 30 "(Error:|failed|FAIL|Timeout|tablet-ipad|mobile layout|QA emulator suite failed|RESOURCE_EXHAUSTED|INTERNAL:)" .github/main-qa-job.log \
            | tail -n 700 > .github/main-qa-job-summary.log || true
      - name: Commit status snapshot
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/main-qa-job.log .github/main-qa-job-summary.log
          git commit -m 'record main QA status'
          git push origin HEAD:agent/main-qa-status-probe
