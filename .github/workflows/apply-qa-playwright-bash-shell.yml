name: Apply QA Playwright Bash shell fix

on:
  push:
    branches:
      - fix/qa-playwright-bash-shell

permissions:
  contents: write

jobs:
  apply-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply workflow fix
        run: python scripts/fix-qa-playwright-shell.py
      - name: Validate source and application
        shell: bash
        run: |
          set +e
          PATCH_STATUS="$(cat .patch-status 2>/dev/null)"
          NPM_CI_STATUS=99
          UNIT_STATUS=99
          BUILD_STATUS=99
          if [ "$PATCH_STATUS" = "ok" ]; then
            npm ci > .npm-ci.log 2>&1
            NPM_CI_STATUS=$?
            if [ $NPM_CI_STATUS -eq 0 ]; then
              npm run test:unit > .unit-test.log 2>&1
              UNIT_STATUS=$?
              npm run build > .build.log 2>&1
              BUILD_STATUS=$?
            fi
          fi
          if [ "$PATCH_STATUS" = "ok" ] && [ $NPM_CI_STATUS -eq 0 ] && [ $UNIT_STATUS -eq 0 ] && [ $BUILD_STATUS -eq 0 ]; then
            rm -f QA_SHELL_FIX_RESULT.md
            COMMIT_MESSAGE="Playwright QA 실행 셸을 Bash로 고정"
          else
            {
              echo '# QA shell fix result'
              echo
              echo "- patch: $PATCH_STATUS"
              echo "- npm ci: $NPM_CI_STATUS"
              echo "- unit: $UNIT_STATUS"
              echo "- build: $BUILD_STATUS"
              for LOG in .patch-error .npm-ci.log .unit-test.log .build.log; do
                if [ -f "$LOG" ]; then
                  echo
                  echo "## $LOG"
                  echo '```text'
                  tail -n 180 "$LOG"
                  echo '```'
                fi
              done
            } > QA_SHELL_FIX_RESULT.md
            COMMIT_MESSAGE="QA Bash 셸 수정 검증 결과 기록"
          fi
          rm -f .patch-status .patch-error .npm-ci.log .unit-test.log .build.log
          rm -f scripts/fix-qa-playwright-shell.py
          rm -f .github/workflows/apply-qa-playwright-bash-shell.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "$COMMIT_MESSAGE"
          git push
