name: Probe merged Main Branch QA 601

on:
  push:
    branches:
      - probe/main-qa-601

permissions:
  actions: read
  contents: write

jobs:
  probe:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TARGET_SHA: 01b31ac1ec402f008ee0ee60a551e7cb97c04590
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Follow Main Branch QA to completion
        shell: bash
        run: |
          set -euo pipefail
          RUN_ID=""
          for attempt in $(seq 1 40); do
            RUNS="$(gh api --method GET "repos/${GITHUB_REPOSITORY}/actions/runs" -f head_sha="$TARGET_SHA" -f event=push -f per_page=20)"
            RUN_ID="$(jq -r '.workflow_runs[] | select(.name == "Main Branch QA") | .id' <<<"$RUNS" | head -n1)"
            if [ -n "$RUN_ID" ] && [ "$RUN_ID" != "null" ]; then break; fi
            sleep 5
          done
          if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
            jq -n --arg sha "$TARGET_SHA" '{error:"Main Branch QA run not found",head_sha:$sha}' > MAIN_QA_601.json
          else
            for attempt in $(seq 1 100); do
              RUN="$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${RUN_ID}")"
              [ "$(jq -r '.status' <<<"$RUN")" = completed ] && break
              sleep 10
            done
            RUN="$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${RUN_ID}")"
            JOBS="$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${RUN_ID}/jobs?per_page=100")"
            jq -n --argjson run "$RUN" --argjson jobs "$JOBS" '{run:{id:$run.id,run_number:$run.run_number,name:$run.name,event:$run.event,status:$run.status,conclusion:$run.conclusion,head_sha:$run.head_sha,html_url:$run.html_url,created_at:$run.created_at,updated_at:$run.updated_at},jobs:[$jobs.jobs[]|{id,name,status,conclusion,started_at,completed_at,html_url,steps:[.steps[]?|{name,status,conclusion,number}]}]}' > MAIN_QA_601.json
          fi
      - name: Commit result
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add MAIN_QA_601.json
          git commit -m "병합 후 Main Branch QA #601 결과 기록"
          git push
