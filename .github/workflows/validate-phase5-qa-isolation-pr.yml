name: Finalize Phase 5 QA Isolation PR

on:
  pull_request:
    branches: [agent/lobby-room-listener-lifecycle]
    types: [synchronize]

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: finalize-phase5-qa-isolation-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  finalize:
    name: Finalize validated phase 5 patch
    if: github.head_ref == 'agent/isolate-qa-firebase-emulator'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/isolate-qa-firebase-emulator
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Apply validated phase 5 patch
        run: |
          python scripts/apply-phase5-qa-isolation.py
          python scripts/patch-phase5-webkit.py
      - run: npm ci
      - name: Production unit tests
        run: npm run test:unit
      - name: Production build
        run: npm run build
      - name: Verify final isolation structure
        run: |
          grep -q "cancel-in-progress: true" .github/workflows/qa.yml
          grep -q "qa-firebase-emulator:" .github/workflows/qa.yml
          grep -q "playwright install --with-deps chromium webkit" .github/workflows/qa.yml
          grep -q "QA_RUN_ID" tests/helpers/cleanup-qa-rooms.js
          grep -q "where('qaRunId', '==', qaRunId)" tests/helpers/cleanup-qa-rooms.js
          if grep -q "collectionGroup" tests/helpers/rooms.js; then exit 1; fi
          if sed -n '/qa-firebase-emulator:/,/qa-stacked-roll-backdo-ai:/p' .github/workflows/qa.yml | grep -q "secrets\.FIREBASE\|vars\.FIREBASE\|VITE_FIREBASE_PROJECT_ID.*secrets"; then exit 1; fi
      - name: Commit only validated phase 5 files
        run: |
          rm .github/workflows/validate-phase5-qa-isolation-pr.yml
          rm scripts/apply-phase5-qa-isolation.py
          rm scripts/patch-phase5-webkit.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            .github/workflows/qa.yml \
            .github/scripts/summarize-qa.mjs \
            src/features/room/services/roomService.ts \
            tests/helpers/rooms.js \
            tests/helpers/cleanup-qa-rooms.js \
            .github/workflows/validate-phase5-qa-isolation-pr.yml \
            scripts/apply-phase5-qa-isolation.py \
            scripts/patch-phase5-webkit.py
          echo 'Validated staged files:'
          git diff --cached --name-only
          git commit -m "test: isolate GitHub Actions QA with Firebase emulators"
          git push origin HEAD:agent/isolate-qa-firebase-emulator
