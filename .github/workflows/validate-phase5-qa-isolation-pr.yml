name: Finalize Phase 5 QA Isolation PR

on:
  pull_request:
    branches: [agent/lobby-room-listener-lifecycle]
    types: [synchronize]

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: finalize-phase5-qa-isolation-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  finalize:
    name: Diagnose and commit phase 5 patch
    if: github.head_ref == 'agent/isolate-qa-firebase-emulator'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/isolate-qa-firebase-emulator
          fetch-depth: 0
      - name: Apply validated phase 5 files
        run: |
          python scripts/apply-phase5-qa-isolation.py
          python scripts/patch-phase5-webkit.py
      - name: Diagnose commit and push
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          rm .github/workflows/validate-phase5-qa-isolation-pr.yml
          rm scripts/apply-phase5-qa-isolation.py
          rm scripts/patch-phase5-webkit.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          {
            echo '## git status before commit'
            git status --short
            echo
            echo '## git commit'
            git commit -am "test: isolate GitHub Actions QA with Firebase emulators"
          } > phase5-finalize.log 2>&1
          commit_code=$?
          push_code=99
          if [ "$commit_code" -eq 0 ]; then
            {
              echo
              echo '## git push'
              git push origin HEAD:agent/isolate-qa-firebase-emulator
            } >> phase5-finalize.log 2>&1
            push_code=$?
          fi
          {
            echo '## Phase 5 finalize diagnostic'
            echo '- Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}'
            echo "- Commit exit: ${commit_code}"
            echo "- Push exit: ${push_code}"
            echo
            echo '```text'
            cat phase5-finalize.log
            echo '```'
          } > phase5-finalize-comment.md
          gh pr comment 563 --repo "${{ github.repository }}" --body-file phase5-finalize-comment.md
          if [ "$commit_code" -ne 0 ] || [ "$push_code" -ne 0 ]; then exit 1; fi
