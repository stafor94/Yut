name: Validate Phase 5 QA Isolation PR

on:
  pull_request:
    branches: [agent/lobby-room-listener-lifecycle]
    types: [synchronize]

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: validate-phase5-qa-isolation-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate production build and emulator QA
    if: github.head_ref == 'agent/isolate-qa-firebase-emulator'
    runs-on: ubuntu-latest
    timeout-minutes: 75
    env:
      QA_RUN_ID: pr-${{ github.event.pull_request.number }}-${{ github.run_id }}-${{ github.run_attempt }}
      QA_PROJECT_ID: demo-yut-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/isolate-qa-firebase-emulator
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Apply exact phase 5 patch
        run: python scripts/apply-phase5-qa-isolation.py
      - run: npm ci
      - name: Production unit tests
        run: npm run test:unit
      - name: Production build without Firebase secrets
        run: npm run build
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Prepare isolated QA Firebase environment
        run: node .github/scripts/write-qa-firebase-env.mjs
      - name: Reject production Firebase configuration
        run: node .github/scripts/verify-qa-emulator-config.mjs
      - name: Build QA app
        run: npm run build:qa
      - name: Run full QA suite inside Firebase emulators
        id: emulator
        continue-on-error: true
        run: |
          set -o pipefail
          npx --yes firebase-tools@latest emulators:exec \
            --config firebase.qa.json \
            --project "$QA_PROJECT_ID" \
            --only auth,firestore \
            "npm run qa:emulator-suite" 2>&1 | tee phase5-emulator-validation.log
      - name: Verify isolation markers
        run: |
          grep -q "cancel-in-progress: true" .github/workflows/qa.yml
          grep -q "qa-firebase-emulator:" .github/workflows/qa.yml
          grep -q "QA_RUN_ID" tests/helpers/cleanup-qa-rooms.js
          grep -q "where('qaRunId', '==', qaRunId)" tests/helpers/cleanup-qa-rooms.js
          if grep -q "collectionGroup" tests/helpers/rooms.js; then exit 1; fi
          if sed -n '/qa-firebase-emulator:/,/qa-stacked-roll-backdo-ai:/p' .github/workflows/qa.yml | grep -q "secrets\.FIREBASE\|vars\.FIREBASE\|VITE_FIREBASE_PROJECT_ID.*secrets"; then exit 1; fi
          grep -q "build-and-unit:" .github/workflows/qa.yml
          grep -q "deploy-pages:" .github/workflows/qa.yml
      - name: Upload emulator diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase5-emulator-diagnostics
          path: |
            phase5-emulator-validation.log
            playwright-*.log
            qa-*.log
            test-results
            firestore-debug.log
            firebase-debug.log
            console-log.txt
          if-no-files-found: ignore
          retention-days: 7
      - name: Comment emulator failure details
        if: steps.emulator.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo '## Phase 5 Firebase emulator diagnostic'
            echo '- Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}'
            echo '- Project: `${{ env.QA_PROJECT_ID }}`'
            echo '- Namespace: `${{ env.QA_RUN_ID }}`'
            echo '- Emulator suite: **failure**'
            for file in qa-emulator-guard.log playwright-qa-firebase-isolation.log playwright-qa-basic-flow.log playwright-qa-online-turn-recovery.log playwright-qa-cleanup-layout-regression.log qa-cleanup-after.log phase5-emulator-validation.log; do
              echo
              echo "<details><summary>${file}</summary>"
              echo
              echo '```text'
              if [ -f "$file" ]; then tail -n 100 "$file"; else echo 'log file not created'; fi
              echo '```'
              echo '</details>'
            done
          } > phase5-diagnostic-comment.md
          gh pr comment 563 --repo "${{ github.repository }}" --body-file phase5-diagnostic-comment.md
      - name: Fail when emulator suite failed
        if: steps.emulator.outcome == 'failure'
        run: exit 1
      - name: Remove temporary validation files and commit
        if: steps.emulator.outcome == 'success'
        run: |
          rm .github/workflows/validate-phase5-qa-isolation-pr.yml
          rm scripts/apply-phase5-qa-isolation.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "test: isolate GitHub Actions QA with Firebase emulators"
          git push origin HEAD:agent/isolate-qa-firebase-emulator
      - name: Comment success
        if: steps.emulator.outcome == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                '## Phase 5 Firebase emulator validation',
                `- Run: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                '- Production unit tests: **success**',
                '- Production build: **success**',
                '- QA emulator build guard: **success**',
                '- Auth and Firestore emulator suite: **success**',
                '- Run-scoped cleanup with zero remaining rooms: **success**',
                '- Production Firebase secrets in QA job: **none**',
              ].join('\n'),
            });
