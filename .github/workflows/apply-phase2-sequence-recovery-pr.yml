name: Apply Phase 2 Sequence Recovery PR

on:
  pull_request:
    branches: [agent/stabilize-game-sync-listener]
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: apply-phase2-sequence-recovery-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  apply-and-validate:
    name: Patch App, unit test, and build
    if: github.head_ref == 'agent/conditional-sequence-recovery'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/conditional-sequence-recovery
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Apply exact App recovery patch
        run: python scripts/apply-phase2-sequence-recovery.py
      - run: npm ci
      - name: Unit tests
        run: npm run test:unit
      - name: Build app
        run: npm run build
      - name: Verify permanent polling was removed
        run: |
          if grep -q "setInterval.*getGameSequencesSince\|SEQUENCE_WATCHDOG_MS" src/app/App.tsx; then
            echo "Permanent sequence polling marker still exists."
            exit 1
          fi
      - name: Remove temporary files and commit validated patch
        run: |
          rm .github/workflows/apply-phase2-sequence-recovery.yml
          rm .github/workflows/apply-phase2-sequence-recovery-pr.yml
          rm scripts/apply-phase2-sequence-recovery.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/app/App.tsx tests/unit/sequenceRecoveryWatchdog.test.ts .github/workflows scripts/apply-phase2-sequence-recovery.py
          git commit -m "feat: replace sequence polling with conditional recovery"
          git push origin HEAD:agent/conditional-sequence-recovery
      - name: Comment success
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                '## Phase 2 App patch validation',
                `- Run: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                '- `npm run test:unit`: **success**',
                '- `npm run build`: **success**',
                '- Permanent 5-second sequence polling marker: **removed**',
              ].join('\n'),
            });
      - name: Comment failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## Phase 2 App patch validation failed\n- Run: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n- No validated App commit was pushed.`,
            });
