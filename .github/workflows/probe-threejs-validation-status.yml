name: Probe Three.js regression validation status

on:
  push:
    branches:
      - probe/threejs-validation-status

permissions:
  actions: read
  contents: write

jobs:
  probe:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    env:
      TARGET_SHA: 2f8e752163b45d4307f63e361efcdc6e7aa03cab
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Query validation status
        shell: bash
        run: |
          set -euo pipefail
          RUNS="$(gh api --method GET "repos/${GITHUB_REPOSITORY}/actions/runs" -f head_sha="$TARGET_SHA" -f per_page=20)"
          jq '{runs:[.workflow_runs[]|{id,name,event,status,conclusion,head_sha,html_url,created_at,updated_at}]}' <<<"$RUNS" > THREEJS_VALIDATION_STATUS.json
      - name: Commit status
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add THREEJS_VALIDATION_STATUS.json
          git commit -m "Three.js 회귀 테스트 검증 상태 기록"
          git push
