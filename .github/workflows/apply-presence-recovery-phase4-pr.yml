name: Apply Presence Recovery Phase 4 PR

on:
  pull_request:
    branches: [agent/presence-recovery-phase4-apply]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Apply phase 4 product changes
        run: |
          python scripts/apply-presence-recovery-phase4.py
          rm scripts/apply-presence-recovery-phase4.py
      - name: Commit product changes without verification
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/app/App.tsx src/app/flows/presenceRecovery.ts src/features/room/services/roomService.ts tests/unit/presenceRecovery.test.ts tsconfig.test.json scripts/apply-presence-recovery-phase4.py
          git commit -m "fix: version AI substitution and reconnect recovery"
          git push origin HEAD:${{ github.head_ref }}
