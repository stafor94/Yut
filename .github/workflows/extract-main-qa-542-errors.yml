name: Extract Main Branch QA 542 errors

on:
  push:
    branches:
      - probe/main-qa-601-snapshot

permissions:
  actions: write
  contents: write

jobs:
  extract:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Stop remaining cleanup and extract logs
        shell: bash
        run: |
          set -euo pipefail
          gh api --method POST "repos/${GITHUB_REPOSITORY}/actions/runs/29211715793/cancel" || true
          : > MAIN_QA_542_ERRORS.log
          for pair in movement:86700520134 desktop:86700520124 online:86700520132 mobile:86700520127; do
            name="${pair%%:*}"
            id="${pair##*:}"
            curl --fail --location --silent --show-error \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/jobs/${id}/logs" \
              -o "${name}.raw"
            if file "${name}.raw" | grep -qi 'zip archive'; then unzip -p "${name}.raw" > "${name}.log"; else cp "${name}.raw" "${name}.log"; fi
            {
              echo "===== ${name} (${id}) ====="
              grep -nEi -C 8 'error|failed|failure|timed out|timeout|expect\(|cleanup|remaining=|cancelled|canceled|exit code|process completed' "${name}.log" | tail -n 320 || tail -n 240 "${name}.log"
              echo
            } >> MAIN_QA_542_ERRORS.log
          done
      - name: Commit extracted errors
        shell: bash
        run: |
          rm -f movement.raw movement.log desktop.raw desktop.log online.raw online.log mobile.raw mobile.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add MAIN_QA_542_ERRORS.log
          git commit -m "Main Branch QA #542 실패 원문 기록"
          git push
