name: Branch source export

on:
  push:
    branches:
      - agent/limit-room-counts-and-fix-qa-cleanup

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-artifact@v4
        with:
          name: branch-source-export
          path: |
            tests/helpers/rooms.js
            BUG_HISTORY.md
          retention-days: 1
