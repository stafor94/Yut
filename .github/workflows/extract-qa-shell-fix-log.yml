name: Extract QA shell fix validation log

on:
  push:
    branches:
      - probe/main-qa-599-snapshot

permissions:
  actions: read
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    env:
      GH_TOKEN: ${{ github.token }}
      JOB_ID: 86699761627
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Download validation job log
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --location --silent --show-error \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/jobs/${JOB_ID}/logs" \
            -o validation.raw
          if file validation.raw | grep -qi 'zip archive'; then unzip -p validation.raw > validation.log; else cp validation.raw validation.log; fi
          tail -n 180 validation.log > QA_SHELL_FIX_JOB_TAIL.log
      - name: Commit log tail
        shell: bash
        run: |
          rm -f .github/workflows/extract-qa-shell-fix-log.yml validation.raw validation.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add QA_SHELL_FIX_JOB_TAIL.log .github/workflows/extract-qa-shell-fix-log.yml
          git commit -m "QA 셸 수정 검증 실패 로그 추출"
          git push
