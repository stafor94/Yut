name: Collect completed Main Branch QA 599 failures

on:
  push:
    branches:
      - probe/main-qa-599-snapshot

permissions:
  actions: read
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ github.token }}
      RUN_ID: 29211032409
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Collect final failed logs
        shell: bash
        run: |
          set -euo pipefail
          gh run view "$RUN_ID" --repo "$GITHUB_REPOSITORY" --json databaseId,workflowName,displayTitle,status,conclusion,headSha,url,jobs > MAIN_QA_599_FINAL_2.json
          gh run view "$RUN_ID" --repo "$GITHUB_REPOSITORY" --log-failed > MAIN_QA_599_FAILED_2.log || true
      - name: Commit evidence
        shell: bash
        run: |
          rm -f .github/workflows/collect-main-qa-599-failures-final.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add MAIN_QA_599_FINAL_2.json MAIN_QA_599_FAILED_2.log .github/workflows/collect-main-qa-599-failures-final.yml
          git commit -m "완료된 Main Branch QA 실패 로그 기록"
          git push
