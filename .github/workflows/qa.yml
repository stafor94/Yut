name: Game QA

on:
  push:
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  build-and-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - name: Build app
        run: |
          set -o pipefail
          npm run build 2>&1 | tee build.log
      - run: npx playwright install --with-deps
      - name: Run Playwright tests
        run: |
          set -o pipefail
          npx playwright test 2>&1 | tee playwright.log
      - name: Summarize QA failure
        if: always()
        run: |
          {
            echo "## Game QA 실행 요약"
            echo
            echo "- 커밋: \`${GITHUB_SHA::7}\`"
            echo "- 이벤트: \`${GITHUB_EVENT_NAME}\`"
            echo "- 실행 결과: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo
            if [ -s build.log ]; then
              echo "### npm run build 마지막 로그"
              echo '```text'
              tail -n 80 build.log
              echo '```'
              echo
            fi
            if [ -s playwright.log ]; then
              echo "### npx playwright test 마지막 로그"
              echo '```text'
              tail -n 160 playwright.log
              echo '```'
              echo
            fi
            if [ ! -s build.log ] && [ ! -s playwright.log ]; then
              echo "아직 빌드 또는 Playwright 로그가 생성되지 않았습니다. 실패한 이전 단계 로그를 확인해주세요."
            fi
          } > qa-failure-summary.md
          cat qa-failure-summary.md >> "$GITHUB_STEP_SUMMARY"
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
            build.log
            playwright.log
            qa-failure-summary.md
          if-no-files-found: ignore
      - name: Create issue on QA failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('node:fs');
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const summary = fs.existsSync('qa-failure-summary.md') ? fs.readFileSync('qa-failure-summary.md', 'utf8') : '요약 로그를 생성하지 못했습니다. Actions 실행 로그를 확인해주세요.';
            const refName = context.ref.replace('refs/heads/', '');
            const targetLabel = `브랜치 ${refName}`;
            const title = `[Game QA 실패] 브랜치 ${refName}`;
            const targetLine = `- 브랜치: \`${refName}\``;
            const body = `## Game QA 실패\n\n` +
              `${targetLine}\n` +
              `- 커밋: \`${context.sha.slice(0, 7)}\`\n` +
              `- Actions 실행: ${runUrl}\n\n` +
              `빌드 또는 Playwright E2E가 실패했습니다. 아래 요약에서 실패 원인을 먼저 확인하고, 전체 로그가 필요할 때만 \`playwright-report\` 아티팩트를 내려받아주세요.\n\n` +
              summary;
            const query = `repo:${context.repo.owner}/${context.repo.repo} is:issue is:open in:title "[Game QA 실패] ${targetLabel}"`;
            const { data: searchResult } = await github.rest.search.issuesAndPullRequests({ q: query, per_page: 1 });
            if (searchResult.items.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: searchResult.items[0].number,
                body: `동일 대상에서 Game QA가 다시 실패했습니다.\n\n- 커밋: \`${context.sha.slice(0, 7)}\`\n- Actions 실행: ${runUrl}\n\n${summary}`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
              });
            }
