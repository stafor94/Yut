name: Game QA

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  build-and-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run build
      - run: npx playwright install --with-deps
      - run: npx playwright test
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
      - name: Comment QA result on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          JOB_STATUS: ${{ job.status }}
        with:
          script: |
            const marker = '<!-- game-qa-result -->';
            const status = process.env.JOB_STATUS;
            const passed = status === 'success';
            const icon = passed ? '✅' : '❌';
            const resultText = passed ? '성공' : '실패';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const pr = context.payload.pull_request;
            const body = `${marker}\n## ${icon} Game QA ${resultText}\n\n` +
              `- 대상 PR: #${pr.number}\n` +
              `- 커밋: \`${context.sha.slice(0, 7)}\`\n` +
              `- 실행 결과: ${runUrl}\n` +
              `- 확인 항목: \`npm run build\`, \`npx playwright test\`\n\n` +
              (passed
                ? '빌드와 Playwright E2E가 통과했습니다.'
                : '빌드 또는 Playwright E2E가 실패했습니다. Actions 실행 결과와 업로드된 `playwright-report` 아티팩트를 확인해주세요.');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              per_page: 100,
            });
            const previous = comments.find((comment) => comment.user.type === 'Bot' && comment.body.includes(marker));
            if (previous) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: previous.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body,
              });
            }
      - name: Create issue on QA failure
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = `[Game QA 실패] PR #${pr.number}: ${pr.title}`;
            const body = `## Game QA 실패\n\n` +
              `- PR: #${pr.number} ${pr.html_url}\n` +
              `- 커밋: \`${context.sha.slice(0, 7)}\`\n` +
              `- Actions 실행: ${runUrl}\n\n` +
              `빌드 또는 Playwright E2E가 실패했습니다. 모바일에서도 PR 댓글과 이 Issue에서 실패 사실을 확인할 수 있습니다. 상세 원인은 Actions 로그와 \`playwright-report\` 아티팩트를 확인해주세요.`;
            const query = `repo:${context.repo.owner}/${context.repo.repo} is:issue is:open in:title "[Game QA 실패] PR #${pr.number}"`;
            const { data: searchResult } = await github.rest.search.issuesAndPullRequests({ q: query, per_page: 1 });
            if (searchResult.items.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: searchResult.items[0].number,
                body: `동일 PR에서 Game QA가 다시 실패했습니다.\n\n- 커밋: \`${context.sha.slice(0, 7)}\`\n- Actions 실행: ${runUrl}`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
              });
            }
