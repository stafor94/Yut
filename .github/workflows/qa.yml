name: Main Branch QA

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pages: write
  id-token: write

concurrency:
  group: main-branch-qa-${{ github.ref_name || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-unit:
    name: Build and unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Prepare canonical production Firebase environment
        run: node .github/scripts/write-firebase-env.mjs
      - name: Build app
        run: |
          set -o pipefail
          npm run build 2>&1 | tee build.log
      - name: Unit tests
        run: |
          set -o pipefail
          npm run test:unit 2>&1 | tee unit.log
      - name: Upload app and logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-and-unit
          path: |
            dist
            build.log
            unit.log
          if-no-files-found: ignore
          retention-days: 7

  qa-firebase-emulator:
    name: QA ${{ matrix.label }}
    needs: build-and-unit
    runs-on: ubuntu-latest
    timeout-minutes: 75
    strategy:
      fail-fast: false
      matrix:
        include:
          - group: online-core
            code: core
            label: Online core
          - group: desktop-regression
            code: desk
            label: Desktop regression
          - group: mobile-galaxy
            code: mobile
            label: Mobile Galaxy
    env:
      QA_RUN_ID: gh-${{ github.run_id }}-${{ github.run_attempt }}-${{ matrix.code }}
      QA_PROJECT_ID: demo-yut-${{ github.run_id }}-${{ matrix.code }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Prepare isolated QA Firebase environment
        run: node .github/scripts/write-qa-firebase-env.mjs
      - name: Reject production Firebase configuration
        run: node .github/scripts/verify-qa-emulator-config.mjs
      - name: Build isolated QA app
        run: |
          set -o pipefail
          npm run build:qa 2>&1 | tee qa-build.log
      - id: emulator-qa
        name: Run ${{ matrix.label }} against Auth and Firestore emulators
        run: |
          set -o pipefail
          npx --yes firebase-tools@latest emulators:exec \
            --config firebase.qa.json \
            --project "$QA_PROJECT_ID" \
            --only auth,firestore \
            "npm run qa:emulator-suite -- --group ${{ matrix.group }}" 2>&1 | tee qa-emulator-suite.log
      - name: Collect shard artifacts
        if: always()
        env:
          SHARD_CODE: ${{ matrix.code }}
          SHARD_GROUP: ${{ matrix.group }}
          SHARD_RESULT: ${{ job.status }}
        run: |
          target="qa-artifacts/$SHARD_CODE"
          mkdir -p "$target"
          printf '%s\n' "$SHARD_GROUP" > "$target/group.txt"
          printf '%s\n' "$SHARD_RESULT" > "$target/result.txt"
          for pattern in test-results playwright-*.log qa-*.log firestore-debug.log firebase-debug.log console-log.txt; do
            for file in $pattern; do
              if [ -e "$file" ]; then
                cp -R "$file" "$target/"
              fi
            done
          done
      - name: Upload ${{ matrix.label }} artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-${{ matrix.code }}-results
          path: qa-artifacts
          if-no-files-found: ignore
          retention-days: 7

  deploy-pages:
    name: Deploy GitHub Pages
    needs: [build-and-unit, qa-firebase-emulator]
    if: github.ref == 'refs/heads/main' && success()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: build-and-unit
      - name: Verify dist exists
        run: |
          test -d dist
          ls -la dist
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4

  summarize-qa-result:
    name: Summarize QA result
    if: always()
    needs: [build-and-unit, qa-firebase-emulator, deploy-pages]
    runs-on: ubuntu-latest
    steps:
      - name: Download QA artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: '*'
          merge-multiple: true
        continue-on-error: true
      - name: Write QA summary
        env:
          BUILD_RESULT: ${{ needs.build-and-unit.result }}
          EMULATOR_RESULT: ${{ needs.qa-firebase-emulator.result }}
          DEPLOY_RESULT: ${{ needs.deploy-pages.result }}
        run: |
          CORE_RESULT=$(cat core/result.txt 2>/dev/null || printf 'unavailable')
          DESKTOP_RESULT=$(cat desk/result.txt 2>/dev/null || printf 'unavailable')
          MOBILE_RESULT=$(cat mobile/result.txt 2>/dev/null || printf 'unavailable')
          {
            echo '## Main Branch QA 결과'
            echo
            echo '| 단계 | 결과 |'
            echo '|---|---|'
            echo "| Build and unit | \`$BUILD_RESULT\` |"
            echo "| QA online core | \`$CORE_RESULT\` |"
            echo "| QA desktop regression | \`$DESKTOP_RESULT\` |"
            echo "| QA mobile Galaxy | \`$MOBILE_RESULT\` |"
            echo "| Firebase emulator QA matrix | \`$EMULATOR_RESULT\` |"
            echo "| Deploy Pages | \`$DEPLOY_RESULT\` |"
          } | tee qa-summary.md
          cat qa-summary.md >> "$GITHUB_STEP_SUMMARY"
      - name: Combine QA logs
        if: always()
        run: find core desk mobile -type f \( -name 'playwright-*.log' -o -name 'qa-*.log' \) -print0 2>/dev/null | xargs -0 cat > playwright.log || touch playwright.log
      - name: Upload QA summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-summary
          path: |
            core
            desk
            mobile
            build.log
            unit.log
            playwright.log
            qa-summary.md
            console-log.txt
          if-no-files-found: ignore
          retention-days: 7
      - name: Fail when a required stage failed
        env:
          RESULTS: ${{ join(needs.*.result, ' ') }}
        run: |
          for result in $RESULTS; do
            test "$result" = success || exit 1
          done
