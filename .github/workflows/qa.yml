name: Game QA

on:
  push:
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  build-and-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - name: Build app
        run: |
          set -o pipefail
          npm run build 2>&1 | tee build.log
      - run: npx playwright install --with-deps
      - name: Run Playwright tests
        run: |
          set -o pipefail
          npx playwright test 2>&1 | tee playwright.log
      - name: Summarize QA failure
        if: always()
        run: |
          node .github/scripts/summarize-qa.mjs
          cat qa-failure-summary.md >> "$GITHUB_STEP_SUMMARY"
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
            build.log
            playwright.log
            qa-failure-summary.md
            qa-environment.md
            qa-failed-tests.md
            qa-failure-details.md
            qa-artifacts.md
            qa-console-summary.md
            qa-artifact-manifest.md
            console-log.txt
            screenshots
          if-no-files-found: ignore
      - name: Create issue on QA failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('node:fs');
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const summary = fs.existsSync('qa-failure-summary.md') ? fs.readFileSync('qa-failure-summary.md', 'utf8') : '요약 로그를 생성하지 못했습니다. Actions 실행 로그를 확인해주세요.';
            const refName = context.ref.replace('refs/heads/', '');
            const targetLabel = `브랜치 ${refName}`;
            const title = `[Game QA 실패] 브랜치 ${refName}`;
            const targetLine = `- 브랜치: \`${refName}\``;
            const body = `## Game QA 실패\n\n` +
              `${targetLine}\n` +
              `- 커밋: \`${context.sha.slice(0, 7)}\`\n` +
              `- Actions 실행: ${runUrl}\n\n` +
              `빌드 또는 Playwright E2E가 실패했습니다. 아래 요약에 실행 환경, 실패 테스트 후보, 실패 상세 블록, 브라우저 콘솔 마지막 로그, 아티팩트 위치를 함께 남깁니다.\n` +
              `trace/video/screenshot 전체가 필요하면 Actions 실행 페이지의 \`playwright-report\` 아티팩트를 확인해주세요.\n\n` +
              summary;
            const query = `repo:${context.repo.owner}/${context.repo.repo} is:issue is:open in:title "[Game QA 실패] ${targetLabel}"`;
            const { data: searchResult } = await github.rest.search.issuesAndPullRequests({ q: query, per_page: 1 });
            if (searchResult.items.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: searchResult.items[0].number,
                body: `동일 대상에서 Game QA가 다시 실패했습니다.\n\n- 커밋: \`${context.sha.slice(0, 7)}\`\n- Actions 실행: ${runUrl}\n\n${summary}`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
              });
            }
