name: Main Branch QA

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pages: write
  id-token: write

concurrency:
  group: main-branch-qa-${{ github.ref_name || github.ref }}
  cancel-in-progress: false

jobs:
  build-and-unit:
    name: Build and unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Prepare Firebase environment
        run: node .github/scripts/write-firebase-env.mjs
        env:
          FIREBASE_CONFIG: ${{ secrets.FIREBASE || vars.FIREBASE }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY || vars.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN || vars.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID || vars.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET || vars.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID || vars.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID || vars.VITE_FIREBASE_APP_ID }}
      - name: Build app
        run: |
          set -o pipefail
          npm run build 2>&1 | tee build.log
      - name: Unit tests
        run: |
          set -o pipefail
          npm run test:unit 2>&1 | tee unit.log
      - name: Upload app and logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-and-unit
          path: |
            dist
            build.log
            unit.log
          if-no-files-found: ignore
          retention-days: 7

  qa-cleanup-before:
    name: Cleanup before QA
    needs: build-and-unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Cleanup old QA data
        run: |
          set -o pipefail
          npm run qa:cleanup-rooms 2>&1 | tee qa-cleanup-before.log
        env:
          FIREBASE_CONFIG: ${{ secrets.FIREBASE || vars.FIREBASE }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY || vars.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN || vars.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID || vars.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET || vars.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID || vars.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID || vars.VITE_FIREBASE_APP_ID }}
      - name: Upload cleanup log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-cleanup-before-results
          path: qa-cleanup-before.log
          if-no-files-found: ignore
          retention-days: 7

  qa-basic-flow:
    name: QA basic flow
    needs: [build-and-unit, qa-cleanup-before]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: build-and-unit
      - run: npx playwright install --with-deps
      - name: Run QA
        run: |
          set -o pipefail
          $QA_COMMAND 2>&1 | tee "$QA_LOG"
        env:
          QA_COMMAND: npm run test:qa-basic-flow
          QA_LOG: playwright-qa-basic-flow.log
          FIREBASE_CONFIG: ${{ secrets.FIREBASE || vars.FIREBASE }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY || vars.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN || vars.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID || vars.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET || vars.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID || vars.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID || vars.VITE_FIREBASE_APP_ID }}
      - name: Upload QA artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-basic-flow-results
          path: |
            test-results
            playwright-qa-basic-flow.log
            console-log.txt
          if-no-files-found: ignore
          retention-days: 7

  qa-online-turn-recovery:
    name: QA online turn recovery
    needs: [build-and-unit, qa-cleanup-before]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: build-and-unit
      - run: npx playwright install --with-deps
      - name: Run online recovery QA
        run: |
          set -o pipefail
          npm run test:qa-online-turn-recovery 2>&1 | tee playwright-qa-online-turn-recovery.log
        env:
          FIREBASE_CONFIG: ${{ secrets.FIREBASE || vars.FIREBASE }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY || vars.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN || vars.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID || vars.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET || vars.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID || vars.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID || vars.VITE_FIREBASE_APP_ID }}
      - name: Upload QA artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-online-turn-recovery-results
          path: |
            test-results
            playwright-qa-online-turn-recovery.log
            console-log.txt
          if-no-files-found: ignore
          retention-days: 7

  qa-stacked-roll-backdo-ai:
    name: QA stacked roll backdo AI
    needs: [build-and-unit, qa-cleanup-before]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Run stacked backdo authoritative QA
        run: |
          set -o pipefail
          npm run test:qa-stacked-roll-backdo-ai 2>&1 | tee qa-stacked-roll-backdo-ai.log
      - name: Upload QA artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-stacked-roll-backdo-ai-results
          path: qa-stacked-roll-backdo-ai.log
          if-no-files-found: ignore
          retention-days: 7

  qa-cleanup-layout-regression:
    name: QA cleanup and layout regression
    needs: [build-and-unit, qa-cleanup-before]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: build-and-unit
      - run: npx playwright install --with-deps
      - name: Run cleanup/layout QA
        run: |
          set -o pipefail
          npm run test:qa-cleanup-layout-regression 2>&1 | tee playwright-qa-cleanup-layout-regression.log
        env:
          FIREBASE_CONFIG: ${{ secrets.FIREBASE || vars.FIREBASE }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY || vars.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN || vars.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID || vars.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET || vars.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID || vars.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID || vars.VITE_FIREBASE_APP_ID }}
      - name: Upload QA artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-cleanup-layout-regression-results
          path: |
            test-results
            playwright-qa-cleanup-layout-regression.log
            console-log.txt
          if-no-files-found: ignore
          retention-days: 7

  qa-cleanup-after:
    name: Cleanup after QA
    if: always()
    needs: [qa-basic-flow, qa-online-turn-recovery, qa-stacked-roll-backdo-ai, qa-cleanup-layout-regression]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Cleanup QA data after tests
        run: |
          set -o pipefail
          npm run qa:cleanup-rooms 2>&1 | tee qa-cleanup-after.log
        env:
          QA_CLEANUP_REPORT_REMAINING: '1'
          FIREBASE_CONFIG: ${{ secrets.FIREBASE || vars.FIREBASE }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY || vars.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN || vars.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID || vars.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET || vars.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID || vars.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID || vars.VITE_FIREBASE_APP_ID }}
      - name: Upload cleanup log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-cleanup-after-results
          path: qa-cleanup-after.log
          if-no-files-found: ignore
          retention-days: 7

  deploy-pages:
    name: Deploy GitHub Pages
    needs:
      - build-and-unit
      - qa-cleanup-before
      - qa-basic-flow
      - qa-online-turn-recovery
      - qa-stacked-roll-backdo-ai
      - qa-cleanup-layout-regression
      - qa-cleanup-after
    if: github.ref == 'refs/heads/main' && success()
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: build-and-unit

      - name: Verify dist exists
        run: |
          test -d dist
          ls -la dist

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v4

  summarize-qa-result:
    name: Summarize QA result
    if: always()
    needs: [build-and-unit, qa-cleanup-before, qa-basic-flow, qa-online-turn-recovery, qa-stacked-roll-backdo-ai, qa-cleanup-layout-regression, qa-cleanup-after]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Download QA artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: '*'
          merge-multiple: true
        continue-on-error: true
      - name: Combine QA logs
        if: always()
        run: |
          cat playwright-*.log qa-*.log unit.log build.log > playwright.log 2>/dev/null || touch playwright.log
      - name: Summarize QA result
        if: always()
        env:
          QA_JOB_STATUS: ${{ (needs.build-and-unit.result == 'success' && needs.qa-cleanup-before.result == 'success' && needs.qa-basic-flow.result == 'success' && needs.qa-online-turn-recovery.result == 'success' && needs.qa-stacked-roll-backdo-ai.result == 'success' && needs.qa-cleanup-layout-regression.result == 'success' && needs.qa-cleanup-after.result == 'success') && 'success' || 'failure' }}
          BUILD_AND_UNIT_JOB_RESULT: ${{ needs.build-and-unit.result }}
          QA_CLEANUP_BEFORE_JOB_RESULT: ${{ needs.qa-cleanup-before.result }}
          QA_BASIC_FLOW_JOB_RESULT: ${{ needs.qa-basic-flow.result }}
          QA_ONLINE_TURN_RECOVERY_JOB_RESULT: ${{ needs.qa-online-turn-recovery.result }}
          QA_STACKED_ROLL_BACKDO_AI_JOB_RESULT: ${{ needs.qa-stacked-roll-backdo-ai.result }}
          QA_CLEANUP_LAYOUT_REGRESSION_JOB_RESULT: ${{ needs.qa-cleanup-layout-regression.result }}
          QA_CLEANUP_AFTER_JOB_RESULT: ${{ needs.qa-cleanup-after.result }}
        run: |
          node .github/scripts/summarize-qa.mjs
          cat qa-failure-summary.md >> "$GITHUB_STEP_SUMMARY"
      - name: Upload QA summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-failure-summary
          path: |
            test-results
            build.log
            unit.log
            playwright.log
            qa-failure-summary.md
            qa-issue-summary.md
            qa-environment.md
            qa-failed-tests.md
            qa-failure-details.md
            qa-artifacts.md
            qa-console-summary.md
            qa-artifact-manifest.md
            console-log.txt
          if-no-files-found: ignore
          retention-days: 7
