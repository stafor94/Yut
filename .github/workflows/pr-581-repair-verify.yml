name: PR 581 Repair and Verify

on:
  push:
    branches:
      - codex/-branch-6-sequence

permissions:
  contents: write

jobs:
  repair-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/-branch-6-sequence
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Keep full state after compact move replay
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/app/App.tsx')
          source = path.read_text()
          replacements = [
              (
                  "    const stateAfter = applySequenceEvent({ ...currentSequenceStateRef.current, lastSequence: Number(sequence.sequence ?? 1) - 1 }, sequence) as SequenceStateSnapshot | null;\n    const finalPieces = (stateAfter?.pieces as BoardPiece[] | undefined) ?? null;",
                  "    const stateAfter = applySequenceEvent({ ...currentSequenceStateRef.current, lastSequence: Number(sequence.sequence ?? 1) - 1 }, sequence) as SequenceStateSnapshot | null;\n    const applyReplayedMoveState = () => {\n      if (stateAfter) applySyncedStateSnapshot(stateAfter, { allowMoveAnimation: false, allowRollAnimation: false, updateVersion: false, updateSequence: false });\n    };\n    const finalPieces = (stateAfter?.pieces as BoardPiece[] | undefined) ?? null;",
              ),
              (
                  "    if (!finalPieces || !movingGroupIds.length || !pathNodeIds.length) {\n      if (finalPieces) setPieces(finalPieces);\n      return;\n    }",
                  "    if (!finalPieces || !movingGroupIds.length || !pathNodeIds.length) {\n      if (finalPieces) setPieces(finalPieces);\n      applyReplayedMoveState();\n      return;\n    }",
              ),
              (
                  "      if (!moveFinished) {\n        setPieces(finalPieces);\n        return;\n      }",
                  "      if (!moveFinished) {\n        setPieces(finalPieces);\n        applyReplayedMoveState();\n        return;\n      }",
              ),
              (
                  "    if (!anchorBefore || !anchorAfter || anchorBefore.nodeId === anchorAfter.nodeId) {\n      setPieces(finalPieces);\n      return;\n    }",
                  "    if (!anchorBefore || !anchorAfter || anchorBefore.nodeId === anchorAfter.nodeId) {\n      setPieces(finalPieces);\n      applyReplayedMoveState();\n      return;\n    }",
              ),
              (
                  "    setPieces(finalPieces);\n    const itemEvent = payload.itemEvent;",
                  "    setPieces(finalPieces);\n    applyReplayedMoveState();\n    const itemEvent = payload.itemEvent;",
              ),
          ]

          changed = False
          for old, new in replacements:
              if new in source:
                  continue
              count = source.count(old)
              if count != 1:
                  raise SystemExit(f'expected one replay replacement, found {count}: {old[:80]!r}')
              source = source.replace(old, new, 1)
              changed = True

          if changed:
              path.write_text(source)
          PY
      - run: npm ci
      - name: Prepare production Firebase environment
        run: node .github/scripts/write-firebase-env.mjs
      - name: Unit tests
        run: npm run test:unit
      - name: Build
        run: npm run build
      - name: Commit verified repair
        run: |
          if git diff --quiet -- src/app/App.tsx; then
            echo "No product repair to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/app/App.tsx
          git commit -m "fix: retain compact move replay state"
          git push origin HEAD:codex/-branch-6-sequence
