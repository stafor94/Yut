name: Apply Phase 3 Presence Cleanup PR

on:
  pull_request:
    branches: [agent/conditional-sequence-recovery]
    types: [synchronize]

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: apply-phase3-presence-cleanup-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  apply-and-validate:
    name: Patch presence cleanup, unit test, and build
    if: github.head_ref == 'agent/single-owner-room-presence-cleanup'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/single-owner-room-presence-cleanup
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Apply exact phase 3 patch
        run: python scripts/apply-phase3-presence-cleanup.py
      - run: npm ci
      - name: Unit tests
        run: npm run test:unit
      - name: Build app
        run: npm run build
      - name: Verify global cleanup removal
        run: |
          if grep -R "cleanupStaleRooms" src; then
            echo "Global stale room cleanup still exists."
            exit 1
          fi
          grep -q "cleanupCurrentRoomPresence" src/app/hooks/useRoomPresence.ts
          grep -q "presenceCleanupLeaseOwnerId" src/features/room/services/roomService.ts
          grep -q "updateDoc(doc(db, 'rooms', roomId, 'players', playerId)" src/features/room/services/roomService.ts
      - name: Remove temporary files and commit validated patch
        run: |
          rm .github/workflows/apply-phase3-presence-cleanup-pr.yml
          rm scripts/apply-phase3-presence-cleanup.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src .github/workflows/apply-phase3-presence-cleanup-pr.yml scripts/apply-phase3-presence-cleanup.py
          git commit -m "feat: assign stale presence cleanup to one room client"
          git push origin HEAD:agent/single-owner-room-presence-cleanup
      - name: Comment success
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                '## Phase 3 core validation',
                `- Run: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                '- `npm run test:unit`: **success**',
                '- `npm run build`: **success**',
                '- Global stale room scan: **removed**',
                '- Current-room lease cleanup: **verified**',
              ].join('\n'),
            });
      - name: Comment failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## Phase 3 core validation failed\n- Run: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n- No validated product patch was pushed.`,
            });
