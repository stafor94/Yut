name: Apply PR 557 Result Hold Guard

on:
  push:
    branches:
      - agent/fix-qa-online-turn-recovery-observation

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-qa-online-turn-recovery-observation
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Apply exact App.tsx patch
        run: node .github/scripts/apply-pr557-result-hold-guard.mjs
      - name: Commit patched product code
        run: |
          if git diff --quiet -- src/app/App.tsx; then
            echo "No App.tsx change required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/app/App.tsx
          git commit -m "fix: keep pending result hold before AI autoplay"
          git push origin HEAD:agent/fix-qa-online-turn-recovery-observation
