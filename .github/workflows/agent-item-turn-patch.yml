name: Agent item turn lifecycle patch

on:
  push:
    branches:
      - agent/item-turn-lifecycle-fixes

permissions:
  contents: write

jobs:
  patch-and-validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Apply and validate
        shell: bash
        run: |
          set +e
          python scripts/agent_item_turn_patch.py > .patch.log 2>&1
          PATCH_STATUS=$?
          NPM_CI_STATUS=99
          BUILD_STATUS=99
          UNIT_STATUS=99
          if [ $PATCH_STATUS -eq 0 ]; then
            npm ci > .npm-ci.log 2>&1
            NPM_CI_STATUS=$?
            if [ $NPM_CI_STATUS -eq 0 ]; then
              npm run build > .build.log 2>&1
              BUILD_STATUS=$?
              npm run test:unit > .unit.log 2>&1
              UNIT_STATUS=$?
            fi
          fi
          if [ $PATCH_STATUS -eq 0 ] && [ $NPM_CI_STATUS -eq 0 ] && [ $BUILD_STATUS -eq 0 ] && [ $UNIT_STATUS -eq 0 ]; then
            rm -f PATCH_RESULT.md
            COMMIT_MESSAGE="fix item and turn lifecycle consistency"
          else
            {
              echo "# Item turn patch result"
              echo
              echo "- patch: $PATCH_STATUS"
              echo "- npm ci: $NPM_CI_STATUS"
              echo "- build: $BUILD_STATUS"
              echo "- unit: $UNIT_STATUS"
              for LOG in .patch.log .npm-ci.log .build.log .unit.log; do
                if [ -f "$LOG" ]; then
                  echo
                  echo "## $LOG"
                  echo '```text'
                  tail -n 220 "$LOG"
                  echo '```'
                fi
              done
            } > PATCH_RESULT.md
            COMMIT_MESSAGE="record item turn patch validation failure"
          fi
          rm -f .patch.log .npm-ci.log .build.log .unit.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "$COMMIT_MESSAGE"
          git push origin HEAD:agent/item-turn-lifecycle-fixes
