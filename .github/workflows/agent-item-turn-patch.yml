name: Agent item turn lifecycle patch

on:
  push:
    branches:
      - agent/item-turn-lifecycle-fixes

permissions:
  contents: write

jobs:
  patch-and-validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Apply scoped patch
        run: python scripts/agent_item_turn_patch.py
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Unit tests
        run: npm run test:unit
      - name: Commit validated changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix item and turn lifecycle consistency"
          git push origin HEAD:agent/item-turn-lifecycle-fixes
# retrigger validation after workflow registration
