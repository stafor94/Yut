name: Diagnose movement after cleanup exit fix

on:
  push:
    branches:
      - fix/qa-postmerge-failures

permissions:
  contents: write

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-noble
      options: --user 1001
    defaults:
      run:
        shell: bash
    env:
      PLAYWRIGHT_BASE_URL: https://stafor94.github.io/Yut/
      QA_RUN_ID: gh-29211715793-2-roll-movement-diagnostic
      QA_ROLE: roll-movement
      QA_ALLOW_PRODUCTION_FIREBASE: '1'
      QA_CLEANUP_REPORT_REMAINING: '1'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: node .github/scripts/write-firebase-env.mjs
      - name: Reproduce movement QA and verify cleanup exits
        run: |
          set +e
          : > QA_POSTMERGE_DIAGNOSTIC.log

          echo '## pre-cleanup' | tee -a QA_POSTMERGE_DIAGNOSTIC.log
          timeout 45s npm run qa:cleanup-rooms 2>&1 | tee -a QA_POSTMERGE_DIAGNOSTIC.log
          PRE_CLEANUP_STATUS=${PIPESTATUS[0]}

          echo '## movement-qa' | tee -a QA_POSTMERGE_DIAGNOSTIC.log
          timeout 12m npm run test:qa-online-turn-recovery -- --output=test-results/roll-movement-diagnostic 2>&1 | tee -a QA_POSTMERGE_DIAGNOSTIC.log
          MOVEMENT_STATUS=${PIPESTATUS[0]}

          echo '## post-cleanup' | tee -a QA_POSTMERGE_DIAGNOSTIC.log
          timeout 90s npm run qa:cleanup-rooms 2>&1 | tee -a QA_POSTMERGE_DIAGNOSTIC.log
          POST_CLEANUP_STATUS=${PIPESTATUS[0]}

          {
            echo
            echo "pre_cleanup_status=$PRE_CLEANUP_STATUS"
            echo "movement_status=$MOVEMENT_STATUS"
            echo "post_cleanup_status=$POST_CLEANUP_STATUS"
          } | tee -a QA_POSTMERGE_DIAGNOSTIC.log
          exit 0
      - name: Commit diagnostic log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add QA_POSTMERGE_DIAGNOSTIC.log
          git commit -m "cleanup 종료와 이동 QA 진단 결과 기록"
          git push
