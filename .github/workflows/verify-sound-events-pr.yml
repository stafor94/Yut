name: Verify sound event changes

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - agent/guarantee-game-event-sounds

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run test:unit
      - run: npm run build
