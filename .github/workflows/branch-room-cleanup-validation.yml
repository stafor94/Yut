name: Branch room cleanup validation

on:
  push:
    branches:
      - agent/limit-room-counts-and-fix-qa-cleanup
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      QA_RUN_ID: gh-${{ github.run_id }}-${{ github.run_attempt }}
      QA_PROJECT_ID: demo-yut-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - run: npm ci
      - name: Production build
        run: |
          set -o pipefail
          npm run build 2>&1 | tee build.log
      - name: Unit tests
        run: |
          set -o pipefail
          npm run test:unit 2>&1 | tee unit.log
      - name: Check maintenance and QA scripts
        run: |
          node --check scripts/cleanup-production-room-backlog.mjs
          node --check tests/helpers/cleanup-qa-rooms.js
          node --check tests/helpers/run-qa-emulator-suite.mjs
          ruby -e "require 'yaml'; YAML.load_file('.github/workflows/qa.yml'); puts 'qa.yml ok'"
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Prepare isolated QA Firebase environment
        run: node .github/scripts/write-qa-firebase-env.mjs
      - name: Guard isolated QA configuration
        run: node .github/scripts/verify-qa-emulator-config.mjs
      - name: QA build
        run: |
          set -o pipefail
          npm run build:qa 2>&1 | tee qa-build.log
      - name: Emulator QA suite
        run: |
          set -o pipefail
          npx --yes firebase-tools@latest emulators:exec \
            --config firebase.qa.json \
            --project "$QA_PROJECT_ID" \
            --only auth,firestore \
            "npm run qa:emulator-suite" 2>&1 | tee qa-emulator-suite.log
      - name: Upload validation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: branch-room-cleanup-validation
          path: |
            build.log
            unit.log
            test-results
            playwright-*.log
            qa-*.log
            firestore-debug.log
            firebase-debug.log
            console-log.txt
          if-no-files-found: ignore
          retention-days: 3
