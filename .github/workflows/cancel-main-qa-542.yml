name: Cancel stuck Main Branch QA 542

on:
  push:
    branches:
      - probe/main-qa-601-snapshot

permissions:
  actions: write

jobs:
  cancel:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Cancel run after completed QA steps
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh api --method POST "repos/${GITHUB_REPOSITORY}/actions/runs/29211715793/cancel"
