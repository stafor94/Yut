name: One-time item turn branch validator

on:
  push:
    branches:
      - main
    paths:
      - .github/agent-item-turn-trigger

permissions:
  contents: write

jobs:
  patch-validate-and-cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: agent/item-turn-lifecycle-fixes
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Apply scoped patch
        run: python scripts/agent_item_turn_patch.py
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Unit tests
        run: npm run test:unit
      - name: Commit validated branch changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix item and turn lifecycle consistency"
          git push origin HEAD:agent/item-turn-lifecycle-fixes
      - name: Remove one-time main trigger
        if: always()
        run: |
          git fetch origin main
          git checkout -B main origin/main
          rm -f .github/agent-item-turn-trigger .github/workflows/agent-item-turn-branch-patcher.yml
          git add -A
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "remove one-time item turn validator"
          git push origin HEAD:main
