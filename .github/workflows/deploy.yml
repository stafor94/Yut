name: Deploy to GitHub Pages
on:
  push:
    branches: [main]
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - name: Prepare Firebase environment
        run: |
          node <<'NODE'
          const fs = require('fs');

          const rawConfig = process.env.FIREBASE_CONFIG?.trim();
          const keyMap = {
            apiKey: 'VITE_FIREBASE_API_KEY',
            authDomain: 'VITE_FIREBASE_AUTH_DOMAIN',
            projectId: 'VITE_FIREBASE_PROJECT_ID',
            storageBucket: 'VITE_FIREBASE_STORAGE_BUCKET',
            messagingSenderId: 'VITE_FIREBASE_MESSAGING_SENDER_ID',
            appId: 'VITE_FIREBASE_APP_ID',
          };

          function parseFirebaseConfig(value) {
            if (!value) return {};

            const objectText = value.match(/firebaseConfig\s*=\s*(\{[\s\S]*?\})\s*;?/)?.[1] ?? value;
            const jsonish = objectText
              .replace(/([{,]\s*)([A-Za-z_$][\w$]*)(\s*:)/g, '$1"$2"$3')
              .replace(/'/g, '"')
              .replace(/,\s*}/g, '}');

            return JSON.parse(jsonish);
          }

          const config = parseFirebaseConfig(rawConfig);
          const lines = [];

          for (const [firebaseKey, envKey] of Object.entries(keyMap)) {
            const value = process.env[envKey] || config[firebaseKey];
            if (value) lines.push(`${envKey}=${value}`);
          }

          fs.writeFileSync('.env.production', `${lines.join('\n')}\n`);
          console.log(`Wrote ${lines.length} Firebase build variables to .env.production`);
          NODE
        env:
          FIREBASE_CONFIG: ${{ secrets.FIREBASE || vars.FIREBASE }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY || vars.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN || vars.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID || vars.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET || vars.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID || vars.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID || vars.VITE_FIREBASE_APP_ID }}
      - run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - uses: actions/deploy-pages@v4
