name: Phase 1 Online Recovery Diagnostic

on:
  push:
    branches: [agent/stabilize-game-sync-listener]

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: phase1-game-sync-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  online-recovery:
    name: Online recovery QA diagnostic
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-noble
      options: --user 1001
    timeout-minutes: 30
    env:
      FIREBASE_CONFIG: ${{ secrets.FIREBASE || vars.FIREBASE }}
      VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY || vars.VITE_FIREBASE_API_KEY }}
      VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN || vars.VITE_FIREBASE_AUTH_DOMAIN }}
      VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID || vars.VITE_FIREBASE_PROJECT_ID }}
      VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET || vars.VITE_FIREBASE_STORAGE_BUCKET }}
      VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID || vars.VITE_FIREBASE_MESSAGING_SENDER_ID }}
      VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID || vars.VITE_FIREBASE_APP_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Prepare Firebase environment
        run: node .github/scripts/write-firebase-env.mjs
      - name: Cleanup QA rooms before test
        run: npm run qa:cleanup-rooms
      - name: Run online recovery QA with captured log
        id: qa
        continue-on-error: true
        run: |
          set -o pipefail
          npm run test:qa-online-turn-recovery 2>&1 | tee online-recovery.log
      - name: Cleanup QA rooms after test
        if: always()
        run: npm run qa:cleanup-rooms
      - name: Upload online recovery diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase1-online-recovery-diagnostic
          path: |
            online-recovery.log
            test-results
            playwright-report
          if-no-files-found: ignore
          retention-days: 7
      - name: Comment diagnostic result
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo '<!-- phase1-online-recovery-diagnostic:${{ github.sha }} -->'
            echo '## Phase 1 online recovery diagnostic'
            echo '- Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}'
            echo '- Head SHA: ${{ github.sha }}'
            echo '- Online recovery QA: **${{ steps.qa.outcome }}**'
            echo
            echo '<details><summary>Log tail</summary>'
            echo
            echo '```text'
            if [ -f online-recovery.log ]; then tail -n 160 online-recovery.log; else echo 'online-recovery.log was not created'; fi
            echo '```'
            echo '</details>'
          } > phase1-diagnostic-comment.md
          gh pr comment 559 --repo "${{ github.repository }}" --body-file phase1-diagnostic-comment.md
      - name: Fail when online recovery QA failed
        if: steps.qa.outcome == 'failure'
        run: exit 1
