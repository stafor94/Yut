name: Phase 1 Online Recovery Diagnostic

on:
  push:
    branches: [agent/stabilize-game-sync-listener]

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: phase1-game-sync-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  online-recovery-diagnostic:
    name: Online recovery QA diagnostic
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-noble
      options: --user 1001
    timeout-minutes: 30
    env:
      FIREBASE_CONFIG: ${{ secrets.FIREBASE || vars.FIREBASE }}
      VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY || vars.VITE_FIREBASE_API_KEY }}
      VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN || vars.VITE_FIREBASE_AUTH_DOMAIN }}
      VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID || vars.VITE_FIREBASE_PROJECT_ID }}
      VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET || vars.VITE_FIREBASE_STORAGE_BUCKET }}
      VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID || vars.VITE_FIREBASE_MESSAGING_SENDER_ID }}
      VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID || vars.VITE_FIREBASE_APP_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Prepare Firebase environment
        run: node .github/scripts/write-firebase-env.mjs
      - name: Build app
        run: npm run build
      - name: Cleanup QA rooms before test
        run: npm run qa:cleanup-rooms
      - name: Run online recovery QA with captured log
        id: qa
        continue-on-error: true
        run: |
          set -o pipefail
          npx playwright test \
            --workers=1 \
            --max-failures=1 \
            --project=desktop-chromium \
            tests/online/room-lifecycle.spec.js \
            tests/regression/bug-history-smoke.spec.js \
            tests/regression/roll-mat-surface.spec.js \
            2>&1 | tee playwright-qa-online-turn-recovery.log
      - name: Cleanup QA rooms after test
        if: always()
        run: npm run qa:cleanup-rooms
      - name: Comment exact failure tail
        if: always()
        uses: actions/github-script@v7
        env:
          QA_OUTCOME: ${{ steps.qa.outcome }}
        with:
          script: |
            const fs = require('node:fs');
            let log = 'playwright-qa-online-turn-recovery.log was not created';
            if (fs.existsSync('playwright-qa-online-turn-recovery.log')) {
              log = fs.readFileSync('playwright-qa-online-turn-recovery.log', 'utf8')
                .split(/\r?\n/)
                .slice(-220)
                .join('\n');
            }
            if (log.length > 55000) log = log.slice(-55000);
            const body = [
              `<!-- phase1-online-recovery-exact-log:${context.sha} -->`,
              '## Phase 1 online recovery exact log',
              `- Run: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              `- Head SHA: ${context.sha}`,
              `- QA outcome: **${process.env.QA_OUTCOME}**`,
              '',
              '<details><summary>Last 220 log lines</summary>',
              '',
              '```text',
              log,
              '```',
              '</details>',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 559,
              body,
            });
      - name: Fail when QA failed
        if: steps.qa.outcome == 'failure'
        run: exit 1
