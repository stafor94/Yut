name: Auth-gated lobby validation

on:
  push:
    branches:
      - agent/auth-gated-lobby-room-subscription
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write

jobs:
  verify:
    if: github.ref_name == 'agent/auth-gated-lobby-room-subscription' || github.event.pull_request.head.ref == 'agent/auth-gated-lobby-room-subscription'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      QA_RUN_ID: auth-gated-${{ github.run_id }}-${{ github.run_attempt }}
      QA_PROJECT_ID: demo-yut-auth-gated-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/auth-gated-lobby-room-subscription
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Apply auth and WebKit emulator listener fixes
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          app_path = Path('src/app/App.tsx')
          app_text = app_path.read_text()
          app_old = "  const rooms = useRooms({ enabled: screen === 'lobby' });\n  const currentUser = userRef.current ?? user;\n  const currentUserId = currentUser?.uid ?? '';\n"
          app_new = "  const currentUser = userRef.current ?? user;\n  const currentUserId = currentUser?.uid ?? '';\n  const rooms = useRooms({ enabled: screen === 'lobby' && Boolean(currentUser) });\n"
          if app_old in app_text:
              app_path.write_text(app_text.replace(app_old, app_new, 1))
          elif app_new not in app_text:
              raise SystemExit('auth-gated room subscription block was not found')

          db_path = Path('src/services/firebase/firebaseDb.ts')
          db_text = db_path.read_text()
          db_old = "import { connectFirestoreEmulator, getFirestore } from 'firebase/firestore';\nimport { firebaseApp, isFirebaseEmulatorMode } from './firebaseApp';\n\nexport const db = firebaseApp ? getFirestore(firebaseApp) : null;\n"
          db_new = "import { connectFirestoreEmulator, getFirestore, initializeFirestore } from 'firebase/firestore';\nimport { firebaseApp, isFirebaseEmulatorMode } from './firebaseApp';\n\nexport const db = firebaseApp\n  ? isFirebaseEmulatorMode\n    ? initializeFirestore(firebaseApp, { experimentalForceLongPolling: true })\n    : getFirestore(firebaseApp)\n  : null;\n"
          if db_old in db_text:
              db_path.write_text(db_text.replace(db_old, db_new, 1))
          elif db_new not in db_text:
              raise SystemExit('Firebase DB initialization block was not found')
          PY
      - run: npm ci
      - name: Unit tests
        run: npm run test:unit
      - name: Production build
        run: npm run build
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit
      - name: Prepare isolated QA Firebase environment
        run: node .github/scripts/write-qa-firebase-env.mjs
      - name: Verify emulator configuration
        run: node .github/scripts/verify-qa-emulator-config.mjs
      - name: Build isolated QA app
        run: npm run build:qa
      - name: Run targeted mobile layout then full Firebase emulator QA suite
        shell: bash
        run: |
          set -o pipefail
          npx --yes firebase-tools@latest emulators:exec \
            --config firebase.qa.json \
            --project "$QA_PROJECT_ID" \
            --only auth,firestore \
            "npm run test:qa-mobile-layout && npm run qa:emulator-suite" 2>&1 | tee auth-gated-emulator.log
      - name: Upload failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: auth-gated-lobby-failure
          path: |
            auth-gated-emulator.log
            test-results
            firestore-debug.log
            firebase-debug.log
          if-no-files-found: ignore
          retention-days: 2
      - name: Commit verified product changes
        shell: bash
        run: |
          git diff --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/app/App.tsx src/services/firebase/firebaseDb.ts
          if git diff --cached --quiet; then
            echo 'No product changes to commit.'
            exit 0
          fi
          git commit -m '인증 후 로비 구독 및 WebKit QA 연결 안정화'
          git push origin HEAD:agent/auth-gated-lobby-room-subscription
