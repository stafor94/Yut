name: Extract Three.js validation patch error

on:
  push:
    branches:
      - probe/threejs-validation-status

permissions:
  actions: read
  contents: write

jobs:
  extract:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ github.token }}
      JOB_ID: 86703343038
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Download validation log
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --location --silent --show-error \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/jobs/${JOB_ID}/logs" \
            -o validation.raw
          if file validation.raw | grep -qi 'zip archive'; then unzip -p validation.raw > validation.log; else cp validation.raw validation.log; fi
          {
            grep -nEi -C 12 'traceback|runtimeerror|syntaxerror|error|expected one match|stale|process completed|exit code' validation.log | tail -n 260 || tail -n 220 validation.log
          } > THREEJS_VALIDATION_PATCH_ERROR.log
      - name: Commit extracted error
        shell: bash
        run: |
          rm -f validation.raw validation.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add THREEJS_VALIDATION_PATCH_ERROR.log
          git commit -m "Three.js 회귀 테스트 패치 오류 기록"
          git push
