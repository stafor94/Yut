name: Probe postmerge diagnostic run

on:
  push:
    branches:
      - probe/main-qa-601-snapshot

permissions:
  actions: read
  contents: read

jobs:
  probe:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    env:
      TARGET_SHA: 9334aad2afd14349a381103065c3bbbb07ad2fea
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - name: Query diagnostic workflow
        shell: bash
        run: |
          set -euo pipefail
          RUNS="$(gh api --method GET "repos/${GITHUB_REPOSITORY}/actions/runs" -f head_sha="$TARGET_SHA" -f per_page=20)"
          jq '{runs:[.workflow_runs[]|{id,name,status,conclusion,head_sha,html_url,created_at,updated_at}]}' <<<"$RUNS" > POSTMERGE_DIAGNOSTIC_RUNS.json
      - name: Upload diagnostic result
        uses: actions/upload-artifact@v4
        with:
          name: postmerge-diagnostic-runs-${{ env.TARGET_SHA }}
          path: POSTMERGE_DIAGNOSTIC_RUNS.json
          if-no-files-found: error
          retention-days: 7
