name: Extract Main Branch QA 599 job logs

on:
  push:
    branches:
      - probe/main-qa-599-snapshot

permissions:
  actions: read
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Download failed job logs
        shell: bash
        run: |
          set -euo pipefail
          : > MAIN_QA_599_JOB_ERRORS.log
          for pair in online:86698708730 movement:86698708746 desktop:86698708748 mobile:86698708769; do
            name="${pair%%:*}"
            id="${pair##*:}"
            curl --fail --location --silent --show-error \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/jobs/${id}/logs" \
              -o "${name}.raw"
            if file "${name}.raw" | grep -qi 'zip archive'; then
              unzip -p "${name}.raw" > "${name}.log"
            else
              cp "${name}.raw" "${name}.log"
            fi
            {
              echo "===== ${name} (${id}) ====="
              grep -nEi -C 5 'error|failed|failure|illegal option|pipefail|not found|permission|timeout|exception' "${name}.log" | tail -n 180 || tail -n 180 "${name}.log"
              echo
            } >> MAIN_QA_599_JOB_ERRORS.log
          done
      - name: Commit extracted errors
        shell: bash
        run: |
          rm -f .github/workflows/extract-main-qa-599-job-logs.yml online.raw online.log movement.raw movement.log desktop.raw desktop.log mobile.raw mobile.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add MAIN_QA_599_JOB_ERRORS.log .github/workflows/extract-main-qa-599-job-logs.yml
          git commit -m "Main Branch QA 실패 job 원문 로그 추출"
          git push
