name: Apply PR 557 Sequence Perfect Retry

on:
  push:
    branches:
      - agent/fix-qa-online-turn-recovery-observation

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-qa-online-turn-recovery-observation
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Apply exact test patch
        run: node .github/scripts/apply-pr557-sequence-perfect-retry.mjs
      - name: Check and commit patched test
        run: |
          node --check tests/regression/bug-history-smoke.spec.js
          if git diff --quiet -- tests/regression/bug-history-smoke.spec.js; then
            echo "No test change required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/regression/bug-history-smoke.spec.js
          git commit -m "test: handle fall and backdo in sequence preview QA"
          git push origin HEAD:agent/fix-qa-online-turn-recovery-observation
