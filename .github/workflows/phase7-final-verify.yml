name: Phase 7 Final Verify

on:
  push:
    branches:
      - agent/presence-recovery-hook-phase7

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/presence-recovery-hook-phase7
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Prepare production Firebase environment
        run: node .github/scripts/write-firebase-env.mjs
      - name: Unit tests
        run: npm run test:unit
      - name: Build
        run: npm run build
      - name: Record successful verification
        run: |
          if git log -1 --pretty=%s | grep -q '^test: verify phase 7 presence hook$'; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "test: verify phase 7 presence hook"
          git push origin HEAD:agent/presence-recovery-hook-phase7
