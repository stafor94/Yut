name: Validate Three.js roll regression test v3

on:
  push:
    branches:
      - fix/threejs-movement-qa-regression

permissions:
  contents: write

jobs:
  validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-noble
      options: --user 1001
    defaults:
      run:
        shell: bash
    env:
      PLAYWRIGHT_BASE_URL: https://stafor94.github.io/Yut/
      QA_RUN_ID: gh-${{ github.run_id }}-${{ github.run_attempt }}-threejs-roll-regression-v3
      QA_ROLE: roll-movement
      QA_ALLOW_PRODUCTION_FIREBASE: '1'
      QA_CLEANUP_REPORT_REMAINING: '1'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Apply stable observers
        run: python scripts/stabilize-threejs-roll-regression-test.py
      - name: Validate unit, build, movement QA and cleanup
        run: |
          set +e
          PATCH_STATUS="$(cat .patch-status 2>/dev/null)"
          NPM_CI_STATUS=99
          UNIT_STATUS=99
          BUILD_STATUS=99
          QA_STATUS=99
          CLEANUP_STATUS=99

          if [ "$PATCH_STATUS" = "ok" ]; then
            npm ci > .npm-ci.log 2>&1
            NPM_CI_STATUS=$?
            if [ $NPM_CI_STATUS -eq 0 ]; then
              node .github/scripts/write-firebase-env.mjs > .firebase-env.log 2>&1
              npm run test:unit > .unit.log 2>&1
              UNIT_STATUS=$?
              npm run build > .build.log 2>&1
              BUILD_STATUS=$?
              npm run test:qa-online-turn-recovery -- --output=test-results/threejs-roll-regression-v3 > .qa.log 2>&1
              QA_STATUS=$?
              npm run qa:cleanup-rooms > .cleanup.log 2>&1
              CLEANUP_STATUS=$?
            fi
          fi

          FAILED=0
          if [ "$PATCH_STATUS" != "ok" ] || [ $NPM_CI_STATUS -ne 0 ] || [ $UNIT_STATUS -ne 0 ] || [ $BUILD_STATUS -ne 0 ] || [ $QA_STATUS -ne 0 ] || [ $CLEANUP_STATUS -ne 0 ]; then
            FAILED=1
          fi

          if [ $FAILED -eq 0 ]; then
            rm -f THREEJS_ROLL_QA_RESULT.md
            COMMIT_MESSAGE="Three.js 윷 상태 전이 회귀 테스트 안정화"
          else
            {
              echo '# Three.js roll QA validation v3'
              echo
              echo "- patch: $PATCH_STATUS"
              echo "- npm ci: $NPM_CI_STATUS"
              echo "- unit: $UNIT_STATUS"
              echo "- build: $BUILD_STATUS"
              echo "- movement QA: $QA_STATUS"
              echo "- cleanup: $CLEANUP_STATUS"
              for LOG in .patch-error .npm-ci.log .firebase-env.log .unit.log .build.log .qa.log .cleanup.log; do
                if [ -f "$LOG" ]; then
                  echo
                  echo "## $LOG"
                  echo '```text'
                  tail -n 320 "$LOG"
                  echo '```'
                fi
              done
            } > THREEJS_ROLL_QA_RESULT.md
            COMMIT_MESSAGE="Three.js 윷 상태 전이 회귀 테스트 최종 검증 결과 기록"
          fi

          rm -f .patch-status .patch-error .npm-ci.log .firebase-env.log .unit.log .build.log .qa.log .cleanup.log
          rm -f .env.production
          rm -f scripts/stabilize-threejs-roll-regression-test.py
          rm -f .github/workflows/validate-threejs-roll-regression-test-v3.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "$COMMIT_MESSAGE"
          git push
          exit $FAILED
